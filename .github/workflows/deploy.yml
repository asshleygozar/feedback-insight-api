name: Build, Publish to GHCR, and Deploy to Heroku

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to Github Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

        # Log in to Heroku
      - name: Log in to Heroku
        uses: docker/login-action@v3
        with:
          registry: ://heroku.com
          username: '_'
          password: ${{secrets.HEROKU_API_KEY}}

        # Build and Push Both to GHCR and Heroku Container Registry
      - name: Build and Push Docker Image to GHCR and Heroku
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{github.repository_owner}}/feedback-insight-api:latest
            ://heroku.com/feedback-insight-api/web

        # Deploying to Heroku
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{secrets.HEROKU_API_KEY}}
        run: |
          sudo curl https://heroku.com | sh
          heroku container:release web --app feedback-insight-api
